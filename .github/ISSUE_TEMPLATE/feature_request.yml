name: 💡 Feature Request
description: Suggest an idea or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      placeholder: What pain point or limitation are you hitting?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: checkboxes
    id: constraints
    attributes:
      label: Fits project constraints?
      options:
        - label: No new runtime npm dependencies
        - label: Can stay within a single `.cjs` file
