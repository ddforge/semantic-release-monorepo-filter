name: 🐛 Bug Report
description: Something isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "node --version"
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: What happened?
      description: Command you ran, expected behaviour, actual output/error.
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: "`.releaserc.json`, CI config, or anything else relevant."
    validations:
      required: false
